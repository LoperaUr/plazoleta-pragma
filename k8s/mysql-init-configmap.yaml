apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-initdb

data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS food_court;
    CREATE DATABASE IF NOT EXISTS users;
    GRANT ALL PRIVILEGES ON food_court.* TO 'appuser'@'%';
    GRANT ALL PRIVILEGES ON users.* TO 'appuser'@'%';
    FLUSH PRIVILEGES;
